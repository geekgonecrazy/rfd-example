name: Re-Render Merged RFDs
on:
  push:
    branches:
      - main
permissions:
  contents: read
  pull-requests: read
jobs:
  render-rfds:
    name: Render RFDs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v3
        with:
          go-version: '>=1.19.0'
      - uses: tj-actions/branch-names@v7
        id: rfdnum
      - name: Install RFD Client
        run: |
          go install github.com/geekgonecrazy/rfd-tool/cmd/rfd-client@latest
      - name: Render and upload
        env: 
          RFD_SERVER: ${{ secrets.RFD_SERVER }}
          RFD_TOKEN: ${{ secrets.RFD_TOKEN }}
        run: |
          rfd-client --folder $PWD/rfds --import
