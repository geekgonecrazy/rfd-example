name: Build Pull Request RFD
on:
  pull_request:
    types: [opened, synchronize, reopened]
permissions:
  contents: read
  pull-requests: read
jobs:
  render-rfd:
    name: Render RFD
    runs-on: ubuntu-latest

    steps:
      - name: Check for discussion link commit
        id: check_commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          COMMIT_MSG=$(gh api repos/${{ github.repository }}/commits/${{ github.event.pull_request.head.sha }} --jq '.commit.message')
          if echo "$COMMIT_MSG" | grep -q "Add discussion link for RFD"; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping workflow - commit adds discussion link"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      - uses: actions/checkout@v3
        if: steps.check_commit.outputs.skip != 'true'
      - uses: actions/setup-go@v3
        if: steps.check_commit.outputs.skip != 'true'
        with:
          go-version: '>=1.19.0'
      - uses: tj-actions/branch-names@v7
        if: steps.check_commit.outputs.skip != 'true'
        id: rfdnum
      - name: Install RFD Client
        if: steps.check_commit.outputs.skip != 'true'
        run: |
          go install github.com/geekgonecrazy/rfd-tool/cmd/rfd-client@latest
      - name: Render and upload
        if: steps.check_commit.outputs.skip != 'true'
        env: 
          RFD_SERVER: ${{ secrets.RFD_SERVER }}
          RFD_TOKEN: ${{ secrets.RFD_TOKEN }}
        run: |
          rfd-client --folder $PWD/rfds --rfd ${{ steps.rfdnum.outputs.current_branch }} --pr-link "${{ github.event.pull_request.html_url }}"
