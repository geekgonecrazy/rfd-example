name: Build Pull Request RFD
on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
permissions:
  contents: read
  pull-requests: read
jobs:
  render-rfd:
    name: Render RFD
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-go@v3
        with:
          go-version: '>=1.19.0'
      - uses: tj-actions/branch-names@v7
        id: branch
      - name: Install RFD Client
        run: |
          go install github.com/geekgonecrazy/rfd-tool/cmd/rfd-client@caf219e9552db82c36029df2b54e31d0a32b0598
      - name: Render and upload
        env: 
          RFD_SERVER: ${{ secrets.RFD_SERVER }}
          RFD_TOKEN: ${{ secrets.RFD_TOKEN }}
          # Use head_ref_branch for PRs, current_branch for direct pushes
          RFD_NUM: ${{ steps.branch.outputs.head_ref_branch || steps.branch.outputs.current_branch }}
        run: |
          echo "Branch/RFD: $RFD_NUM"
          if [[ "$RFD_NUM" =~ ^[0-9]+$ ]]; then
            rfd-client --folder $PWD/rfds --rfd $RFD_NUM
          else
            echo "Branch name '$RFD_NUM' is not a valid RFD number, skipping render"
          fi
